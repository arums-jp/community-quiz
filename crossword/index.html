<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>クロスワードパズル</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', 'Meiryo', sans-serif;
      background-color: #fdf6ee;
      color: #4a3728;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 16px;
    }

    #app {
      width: 100%;
      max-width: 480px;
      min-height: calc(100vh - 32px);
      display: flex;
      flex-direction: column;
    }

    /* =============================================
       共通カード
    ============================================= */
    .card {
      background-color: #fffaf4;
      border-radius: 20px;
      padding: 32px 24px;
      box-shadow: 0 4px 16px rgba(180, 120, 60, 0.15);
      width: 100%;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    /* =============================================
       共通ボタン
    ============================================= */
    .btn {
      display: block;
      width: 100%;
      min-height: 56px;
      border: none;
      border-radius: 16px;
      font-size: 20px;
      font-weight: bold;
      cursor: pointer;
      padding: 12px 16px;
      line-height: 1.4;
      transition: opacity 0.15s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
      font-family: inherit;
    }

    .btn:active {
      opacity: 0.85;
      transform: scale(0.98);
    }

    .btn-primary {
      background-color: #e07b39;
      color: #fff;
      box-shadow: 0 4px 10px rgba(224, 123, 57, 0.35);
    }

    .btn-primary:hover { background-color: #c96a28; }

    .btn-secondary {
      background-color: #f2d9bc;
      color: #4a3728;
      box-shadow: 0 2px 6px rgba(180, 120, 60, 0.15);
    }

    .btn-secondary:hover { background-color: #e8c9a4; }

    /* =============================================
       画面制御
    ============================================= */
    .screen { display: none; }
    .screen.active { display: flex; }

    /* =============================================
       読み込み画面
    ============================================= */
    #screen-loading {
      justify-content: center;
      align-items: center;
      text-align: center;
      gap: 20px;
    }

    .loading-spinner {
      width: 56px;
      height: 56px;
      border: 6px solid #f2d9bc;
      border-top-color: #e07b39;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
      margin: 0 auto;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-text { font-size: 20px; color: #8c6b4a; }

    .error-icon { font-size: 52px; text-align: center; }

    .error-title {
      font-size: 22px;
      font-weight: bold;
      color: #c0392b;
      text-align: center;
    }

    .error-message {
      font-size: 17px;
      color: #4a3728;
      line-height: 1.7;
      word-break: break-all;
      background-color: #fdf0e0;
      border-radius: 12px;
      padding: 16px;
      white-space: pre-wrap;
    }

    /* =============================================
       スタート画面
    ============================================= */
    #screen-start {
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    .game-title-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .game-title-icon { font-size: 56px; }

    .game-title {
      font-size: 32px;
      font-weight: bold;
      color: #c96a28;
    }

    .game-subtitle { font-size: 18px; color: #8c6b4a; }

    .start-info {
      background-color: #fdf0e0;
      border-radius: 14px;
      padding: 20px;
      width: 100%;
    }

    .start-info-text {
      font-size: 19px;
      color: #4a3728;
      line-height: 1.9;
    }

    /* =============================================
       ゲーム画面
    ============================================= */
    #screen-game {
      gap: 0;
      padding: 20px 24px;
    }

    /* 進捗 */
    .progress-bar-bg {
      width: 100%;
      height: 8px;
      background-color: #f2d9bc;
      border-radius: 99px;
      overflow: hidden;
      margin-bottom: 20px;
    }

    .progress-bar-fill {
      height: 100%;
      background-color: #e07b39;
      border-radius: 99px;
      transition: width 0.4s ease;
    }

    /* =============================================
       十字パーツ
    ============================================= */
    .puzzle-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      flex: 1;
    }

    /* 1問分のコンテナ */
    .cross-item {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      padding: 20px 0 24px;
      border-bottom: 1px dashed #e0c4a0;
    }

    .cross-item:last-child {
      border-bottom: none;
    }

    /* 問題番号 */
    .cross-number {
      font-size: 13px;
      font-weight: bold;
      color: #e07b39;
      align-self: flex-start;
    }

    /* 十字グリッド */
    .cross-grid {
      display: grid;
      gap: 3px;
    }

    /* 個別マス */
    .cross-cell {
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 6px;
      font-weight: bold;
      font-size: 22px;
      line-height: 1;
      user-select: none;
    }

    /* 透明マス（グリッド整合用） */
    .cross-cell.empty {
      background: transparent;
      border: none;
    }

    /* 文字マス（周囲の確定文字） */
    .cross-cell.fixed {
      background-color: #fff;
      border: 2px solid #e0c4a0;
      color: #4a3728;
    }

    /* 答えマス（□） */
    .cross-cell.answer {
      background-color: #fff;
      border: 3px solid #e07b39;
      color: #4a3728;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: background-color 0.15s;
      position: relative;
    }

    .cross-cell.answer:active {
      background-color: #fff3e0;
    }

    /* 答え入力済み */
    .cross-cell.answer.filled {
      background-color: #fff3e0;
    }

    /* 正解 */
    .cross-cell.answer.correct {
      background-color: #d4edda;
      border-color: #4cae4c;
      color: #2d6a2d;
    }

    /* 不正解 */
    .cross-cell.answer.wrong {
      background-color: #f8d7da;
      border-color: #d9534f;
      color: #842029;
    }

    /* ヒントエリア */
    .cross-hints {
      width: 100%;
      background-color: #fdf0e0;
      border-radius: 12px;
      padding: 12px 14px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .cross-hint-row {
      display: flex;
      gap: 8px;
      font-size: 16px;
      line-height: 1.5;
      color: #4a3728;
    }

    .cross-hint-dir {
      font-weight: bold;
      color: #e07b39;
      flex-shrink: 0;
      width: 2em;
    }

    /* ゲームボタン */
    .game-btns {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }

    .game-btns .btn {
      font-size: 17px;
      min-height: 48px;
    }

    /* =============================================
       結果画面
    ============================================= */
    #screen-result {
      justify-content: center;
      align-items: center;
      text-align: center;
      gap: 24px;
    }

    .result-icon { font-size: 64px; }

    .result-title {
      font-size: 28px;
      font-weight: bold;
      color: #c96a28;
    }

    .result-box {
      background-color: #fdf0e0;
      border-radius: 20px;
      padding: 24px;
      width: 100%;
    }

    .result-box-text {
      font-size: 20px;
      color: #4a3728;
      line-height: 1.8;
    }

    /* =============================================
       文字入力ダイアログ
    ============================================= */
    #input-dialog {
      display: none;
      position: fixed;
      inset: 0;
      background-color: rgba(74, 55, 40, 0.55);
      z-index: 100;
      justify-content: flex-end;
      align-items: flex-end;
    }

    #input-dialog.open { display: flex; }

    .dialog-panel {
      background-color: #fffaf4;
      border-radius: 24px 24px 0 0;
      padding: 20px 16px 32px;
      width: 100%;
      box-shadow: 0 -4px 24px rgba(74, 55, 40, 0.2);
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .dialog-title {
      font-size: 16px;
      font-weight: bold;
      color: #8c6b4a;
      text-align: center;
    }

    .row-buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }

    .row-btn {
      padding: 12px 4px;
      border: 2px solid #e0c4a0;
      border-radius: 12px;
      background-color: #fff;
      font-size: 17px;
      font-weight: bold;
      color: #4a3728;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      font-family: inherit;
      text-align: center;
      transition: background-color 0.1s;
    }

    .row-btn:active { background-color: #fdf0e0; transform: scale(0.96); }
    .row-btn.erase-btn  { border-color: #d9534f; color: #842029; }
    .row-btn.single-btn { border-color: #c96a28; color: #c96a28; }

    .char-buttons {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
    }

    .char-btn {
      padding: 14px 4px;
      border: 2px solid #e07b39;
      border-radius: 12px;
      background-color: #fff;
      font-size: 20px;
      font-weight: bold;
      color: #4a3728;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      font-family: inherit;
      text-align: center;
      transition: background-color 0.1s;
    }

    .char-btn:active { background-color: #fdf0e0; transform: scale(0.96); }

    .dialog-back-btn {
      padding: 10px;
      border: 2px solid #e0c4a0;
      border-radius: 10px;
      background-color: #f2d9bc;
      font-size: 15px;
      color: #4a3728;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      font-family: inherit;
      text-align: center;
      font-weight: bold;
    }

    .dialog-back-btn:active { opacity: 0.8; }
  </style>
</head>
<body>
  <div id="app">

    <!-- ========== 読み込み画面 ========== -->
    <div id="screen-loading" class="screen card active">
      <div class="loading-spinner"></div>
      <p class="loading-text">データを読み込んでいます…</p>
    </div>

    <!-- ========== スタート画面 ========== -->
    <div id="screen-start" class="screen card">
      <div class="game-title-wrapper">
        <div class="game-title-icon">📝</div>
        <h1 class="game-title">クロスワード</h1>
        <p class="game-subtitle">交差する文字を当てよう！</p>
      </div>
      <div class="start-info">
        <p class="start-info-text">
          横と縦の言葉が<br>
          交わっているマスに<br>
          当てはまるカタカナを<br>
          入れてください。
        </p>
      </div>
      <button class="btn btn-primary" onclick="startGame()">はじめる</button>
    </div>

    <!-- ========== ゲーム画面 ========== -->
    <div id="screen-game" class="screen card">
      <div class="progress-bar-bg">
        <div class="progress-bar-fill" id="progress-bar" style="width:0%"></div>
      </div>
      <div class="puzzle-area" id="puzzle-area"></div>
      <div class="game-btns">
        <button class="btn btn-primary"   onclick="checkAnswers()">答え合わせ</button>
        <button class="btn btn-secondary" onclick="resetInputs()">リセット</button>
      </div>
    </div>

    <!-- ========== 結果画面 ========== -->
    <div id="screen-result" class="screen card">
      <div class="result-icon" id="result-icon">🎉</div>
      <p class="result-title" id="result-title">全問正解！</p>
      <div class="result-box">
        <p class="result-box-text" id="result-score"></p>
        <p class="result-box-text" id="result-message"></p>
      </div>
      <button class="btn btn-primary"   onclick="startGame()">もう一度あそぶ</button>
      <button class="btn btn-secondary" onclick="goTop()">トップへもどる</button>
    </div>

  </div>

  <!-- 文字入力ダイアログ -->
  <div id="input-dialog">
    <div class="dialog-panel">
      <p class="dialog-title" id="dialog-title">文字を選んでください</p>
      <div id="step-row"  class="row-buttons"></div>
      <div id="step-char" class="char-buttons" style="display:none;"></div>
      <button class="dialog-back-btn" id="dialog-back" style="display:none;" onclick="backToRowSelect()">← 行選択に戻る</button>
    </div>
  </div>

  <script src="../config.js"></script>
  <script>
    // =============================================
    // カタカナ行データ
    // =============================================
    var KANA_ROWS = [
      { label: 'ア行', chars: ['ア','イ','ウ','エ','オ'] },
      { label: 'カ行', chars: ['カ','キ','ク','ケ','コ'] },
      { label: 'サ行', chars: ['サ','シ','ス','セ','ソ'] },
      { label: 'タ行', chars: ['タ','チ','ツ','テ','ト'] },
      { label: 'ナ行', chars: ['ナ','ニ','ヌ','ネ','ノ'] },
      { label: 'ハ行', chars: ['ハ','ヒ','フ','ヘ','ホ'], dakuten: true },
      { label: 'マ行', chars: ['マ','ミ','ム','メ','モ'] },
      { label: 'ヤ行', chars: ['ヤ','ユ','ヨ'] },
      { label: 'ラ行', chars: ['ラ','リ','ル','レ','ロ'] },
      { label: 'ワ行', chars: ['ワ','ヲ'] },
      { label: 'ン',   chars: ['ン'], single: true },
      { label: '消す', chars: [], erase: true },
    ];

    // ハ行選択後に表示する濁点・半濁点の選択肢
    var HA_VARIANTS = [
      { label: 'ハ行', chars: ['ハ','ヒ','フ','ヘ','ホ'] },
      { label: 'バ行', chars: ['バ','ビ','ブ','ベ','ボ'] },
      { label: 'パ行', chars: ['パ','ピ','プ','ペ','ポ'] },
    ];

    // =============================================
    // グローバル変数
    // =============================================

    /**
     * puzzles = [
     *   {
     *     yoko: 'スイカ',          // 横の単語
     *     tate: 'カラス',          // 縦の単語
     *     yokoIdx: 2,              // 横の何文字目（0始まり）が交差
     *     tateIdx: 0,              // 縦の何文字目（0始まり）が交差
     *     answer: 'カ',            // 交差する文字（正解）
     *     hint: 'ヒント文',
     *     userInput: '',           // ユーザー入力
     *   }, ...
     * ]
     */
    var puzzles = [];

    /** 現在ダイアログを開いているパズルのインデックス */
    var activeIdx = -1;

    // =============================================
    // 画面切り替え
    // =============================================
    function showScreen(id) {
      document.querySelectorAll('.screen').forEach(function(el) {
        el.classList.remove('active');
      });
      document.getElementById(id).classList.add('active');
    }

    // =============================================
    // XSSエスケープ
    // =============================================
    function escapeHtml(str) {
      if (typeof str !== 'string') return '';
      return str
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    // =============================================
    // エラー表示
    // =============================================
    function showError(title, detail) {
      var el = document.getElementById('screen-loading');
      el.innerHTML =
        '<div class="error-icon">⚠️</div>' +
        '<p class="error-title">' + escapeHtml(title) + '</p>' +
        '<div class="error-message">' + escapeHtml(detail) + '</div>' +
        '<button class="btn btn-secondary" style="margin-top:8px;" onclick="location.reload()">再読み込み</button>';
      showScreen('screen-loading');
    }

    // =============================================
    // データ取得
    // =============================================
    async function fetchData() {
      if (!CONFIG.SPREADSHEET_ID || CONFIG.SPREADSHEET_ID === 'ここにスプレッドシートIDを入力') {
        showError('スプレッドシートIDが設定されていません。', 'config.js の SPREADSHEET_ID を入力してください。');
        return;
      }
      if (!CONFIG.API_KEY || CONFIG.API_KEY === 'ここにAPIキーを入力') {
        showError('APIキーが設定されていません。', 'config.js の API_KEY を入力してください。');
        return;
      }

      var sheetName = CONFIG.CROSSWORD_SHEET || 'クロスワード';
      var range = encodeURIComponent(sheetName + '!A2:C1000');
      var url = 'https://sheets.googleapis.com/v4/spreadsheets/' +
        CONFIG.SPREADSHEET_ID + '/values/' + range + '?key=' + CONFIG.API_KEY;

      try {
        var resp = await fetch(url);
        if (!resp.ok) {
          var e = await resp.json().catch(function() { return {}; });
          showError('データの取得に失敗しました（' + resp.status + '）',
            (e.error && e.error.message) ? e.error.message : resp.statusText);
          return;
        }

        var json = await resp.json();
        var rows = json.values || [];

        if (rows.length === 0) {
          showError('データが空です。', 'スプレッドシートにデータを入力してください。');
          return;
        }

        puzzles = [];
        rows.forEach(function(row) {
          var yoko = String(row[0] || '').trim();
          var tate = String(row[1] || '').trim();
          var hint = String(row[2] || '').trim();
          if (!yoko || !tate) return;

          // 共通文字を探す（最初に見つかった組み合わせを使用）
          var found = null;
          outer: for (var yi = 0; yi < yoko.length; yi++) {
            for (var ti = 0; ti < tate.length; ti++) {
              if (yoko[yi] === tate[ti]) {
                found = { yokoIdx: yi, tateIdx: ti, answer: yoko[yi] };
                break outer;
              }
            }
          }
          if (!found) return; // 共通文字なし → スキップ

          puzzles.push({
            yoko:      yoko,
            tate:      tate,
            yokoIdx:   found.yokoIdx,
            tateIdx:   found.tateIdx,
            answer:    found.answer,
            hint:      hint,
            userInput: '',
          });
        });

        if (puzzles.length === 0) {
          showError('有効な問題がありません。',
            '横と縦の単語に共通する文字がある行を入力してください。');
          return;
        }

        // シャッフルして最大問題数に絞る
        puzzles = shuffleArray(puzzles);
        var max = (CONFIG.MAX_QUESTIONS && CONFIG.MAX_QUESTIONS > 0) ? CONFIG.MAX_QUESTIONS : 10;
        if (puzzles.length > max) puzzles = puzzles.slice(0, max);

        showScreen('screen-start');

      } catch (ex) {
        showError('ネットワークエラーが発生しました。',
          'インターネット接続を確認してください。\n(' + ex.message + ')');
      }
    }

    // =============================================
    // ゲーム開始
    // =============================================
    function startGame() {
      puzzles.forEach(function(p) { p.userInput = ''; });
      activeIdx = -1;
      renderPuzzles();
      updateProgress();
      showScreen('screen-game');
    }

    // =============================================
    // パズル描画
    // =============================================
    function renderPuzzles() {
      var area = document.getElementById('puzzle-area');
      area.innerHTML = '';

      puzzles.forEach(function(p, idx) {
        area.appendChild(buildCrossItem(p, idx));
      });
    }

    /**
     * 1問分の十字パーツを構築する。
     *
     * グリッドのレイアウト：
     *   列方向: 縦単語の各文字を中央列に置く
     *   行方向: 横単語の各文字を交差行に置く
     *
     * グリッドサイズ:
     *   cols = yoko.length（横単語の文字数）
     *   rows = tate.length（縦単語の文字数）
     *
     * 交差位置:
     *   grid[tateIdx][yokoIdx] = 答えマス
     *   それ以外の行: yokoIdx列のみ縦文字、他は透明
     *   交差行: 横文字が全列に並ぶ
     */
    function buildCrossItem(p, idx) {
      var item = document.createElement('div');
      item.className = 'cross-item';

      // 問題番号
      var numEl = document.createElement('div');
      numEl.className = 'cross-number';
      numEl.textContent = (idx + 1) + '問目';
      item.appendChild(numEl);

      // セルサイズ計算
      var availPx  = Math.min(480, window.innerWidth) - 32 - 48;
      var maxCols  = Math.max(p.yoko.length, 5); // 最低5列分確保して小さくなりすぎを防ぐ
      var cellSize = Math.min(52, Math.floor(availPx / p.yoko.length));

      var cols = p.yoko.length;
      var rows = p.tate.length;

      // グリッド生成
      var grid = document.createElement('div');
      grid.className = 'cross-grid';
      grid.style.gridTemplateColumns = 'repeat(' + cols + ', ' + cellSize + 'px)';
      grid.style.gridTemplateRows    = 'repeat(' + rows + ', ' + cellSize + 'px)';

      for (var r = 0; r < rows; r++) {
        for (var c = 0; c < cols; c++) {
          var cell = document.createElement('div');
          cell.className = 'cross-cell';
          cell.style.width  = cellSize + 'px';
          cell.style.height = cellSize + 'px';
          cell.style.fontSize = Math.floor(cellSize * 0.52) + 'px';

          if (r === p.tateIdx && c === p.yokoIdx) {
            // 答えマス
            cell.classList.add('answer');
            cell.id = 'answer-' + idx;
            cell.textContent = p.userInput || '';
            if (p.userInput) cell.classList.add('filled');
            cell.addEventListener('click', (function(i) {
              return function() { openInputDialog(i); };
            })(idx));

          } else if (r === p.tateIdx) {
            // 交差行の横文字
            cell.classList.add('fixed');
            cell.textContent = p.yoko[c];

          } else if (c === p.yokoIdx) {
            // 縦文字
            cell.classList.add('fixed');
            cell.textContent = p.tate[r];

          } else {
            // 空マス
            cell.classList.add('empty');
          }

          grid.appendChild(cell);
        }
      }

      item.appendChild(grid);

      // ヒント
      if (p.hint) {
        var hints = p.hint.split('/');
        var hintArea = document.createElement('div');
        hintArea.className = 'cross-hints';

        var dirs = ['→', '↓'];
        var words = [p.yoko, p.tate];
        hints.forEach(function(h, hi) {
          h = h.trim();
          if (!h) return;
          var row = document.createElement('div');
          row.className = 'cross-hint-row';
          row.innerHTML =
            '<span class="cross-hint-dir">' + dirs[hi] + '</span>' +
            '<span>' + escapeHtml(h) + '</span>';
          hintArea.appendChild(row);
        });

        item.appendChild(hintArea);
      }

      return item;
    }

    // =============================================
    // 進捗バー更新
    // =============================================
    function updateProgress() {
      var answered = puzzles.filter(function(p) { return p.userInput !== ''; }).length;
      var pct = puzzles.length > 0 ? (answered / puzzles.length) * 100 : 0;
      document.getElementById('progress-bar').style.width = pct + '%';
    }

    // =============================================
    // 文字入力ダイアログ
    // =============================================
    function openInputDialog(idx) {
      activeIdx = idx;
      var p = puzzles[idx];

      // タイトルに横・縦単語を表示（□で答えマスを示す）
      var yokoDisplay = p.yoko.split('').map(function(ch, i) {
        return i === p.yokoIdx ? '□' : ch;
      }).join('');
      var tateDisplay = p.tate.split('').map(function(ch, i) {
        return i === p.tateIdx ? '□' : ch;
      }).join('');
      document.getElementById('dialog-title').textContent =
        '→ ' + yokoDisplay + '　↓ ' + tateDisplay;

      document.getElementById('input-dialog').classList.add('open');
      showRowSelect();
    }

    function closeInputDialog() {
      document.getElementById('input-dialog').classList.remove('open');
      activeIdx = -1;
    }

    function showRowSelect() {
      document.getElementById('step-row').style.display  = '';
      document.getElementById('step-char').style.display = 'none';
      document.getElementById('dialog-back').style.display = 'none';

      var stepRow = document.getElementById('step-row');
      stepRow.innerHTML = '';

      KANA_ROWS.forEach(function(rowDef) {
        var btn = document.createElement('button');
        btn.className = 'row-btn';
        if (rowDef.erase)  btn.classList.add('erase-btn');
        if (rowDef.single) btn.classList.add('single-btn');
        btn.textContent = rowDef.label;
        btn.addEventListener('click', (function(rd) {
          return function() { onRowBtnClick(rd); };
        })(rowDef));
        stepRow.appendChild(btn);
      });
    }

    function onRowBtnClick(rowDef) {
      if (rowDef.erase)   { inputChar('');              return; }
      if (rowDef.single)  { inputChar(rowDef.chars[0]); return; }
      if (rowDef.dakuten) { showDakutenSelect();         return; }
      showCharSelect(rowDef);
    }

    // ハ行 → バ行・パ行の選択
    function showDakutenSelect() {
      document.getElementById('step-row').style.display  = 'none';
      document.getElementById('step-char').style.display = 'none';
      document.getElementById('dialog-back').style.display = '';

      var stepRow = document.getElementById('step-row');
      stepRow.innerHTML = '';
      stepRow.style.display = '';

      HA_VARIANTS.forEach(function(varDef) {
        var btn = document.createElement('button');
        btn.className = 'row-btn';
        btn.textContent = varDef.label;
        btn.addEventListener('click', (function(vd) {
          return function() { showCharSelect(vd); };
        })(varDef));
        stepRow.appendChild(btn);
      });
    }

    function showCharSelect(rowDef) {
      document.getElementById('step-row').style.display  = 'none';
      document.getElementById('step-char').style.display = '';
      document.getElementById('dialog-back').style.display = '';

      var stepChar = document.getElementById('step-char');
      stepChar.innerHTML = '';

      rowDef.chars.forEach(function(ch) {
        var btn = document.createElement('button');
        btn.className = 'char-btn';
        btn.textContent = ch;
        btn.addEventListener('click', (function(c) {
          return function() { inputChar(c); };
        })(ch));
        stepChar.appendChild(btn);
      });
    }

    function backToRowSelect() { showRowSelect(); }

    function inputChar(ch) {
      if (activeIdx < 0) { closeInputDialog(); return; }

      var p = puzzles[activeIdx];
      p.userInput = ch;

      // 答えマスの表示更新
      var answerEl = document.getElementById('answer-' + activeIdx);
      if (answerEl) {
        answerEl.textContent = ch;
        answerEl.classList.remove('correct', 'wrong');
        answerEl.classList.toggle('filled', ch !== '');
      }

      updateProgress();
      closeInputDialog();
    }

    // =============================================
    // 答え合わせ
    // =============================================
    function checkAnswers() {
      var correctCount = 0;

      puzzles.forEach(function(p, idx) {
        var answerEl = document.getElementById('answer-' + idx);
        if (!answerEl) return;

        answerEl.classList.remove('correct', 'wrong');

        if (p.userInput === p.answer) {
          answerEl.classList.add('correct');
          correctCount++;
        } else {
          answerEl.classList.add('wrong');
        }
      });

      if (correctCount === puzzles.length) {
        setTimeout(function() { showResult(correctCount); }, 800);
      }
    }

    // =============================================
    // 結果画面表示
    // =============================================
    function showResult(correctCount) {
      var total = puzzles.length;
      var ratio = total > 0 ? correctCount / total : 0;

      var icon, title, message;
      if (ratio === 1.0) {
        icon    = '🏆';
        title   = '全問正解！パーフェクトです！';
        message = 'おめでとうございます！すべての答えが正しく入りました！';
      } else if (ratio >= 0.9) {
        icon    = '🎖️';
        title   = 'すばらしい！あと一歩で満点！';
        message = 'ほぼ全問正解！もう一度チャレンジしてみてください。';
      } else if (ratio >= 0.7) {
        icon    = '🎉';
        title   = 'よくできました！';
        message = '多くの問題に正解できました。すごいですね！';
      } else if (ratio >= 0.5) {
        icon    = '😊';
        title   = 'もう少し！';
        message = 'もう一度チャレンジして、さらに高得点を目指してみましょう！';
      } else {
        icon    = '😌';
        title   = 'またチャレンジしてみてください！';
        message = '次回は今回より多く正解できるといいですね。';
      }

      document.getElementById('result-icon').textContent    = icon;
      document.getElementById('result-title').textContent   = title;
      document.getElementById('result-score').textContent   = correctCount + ' ／ ' + total + ' 問正解';
      document.getElementById('result-message').textContent = message;

      showScreen('screen-result');
    }

    // =============================================
    // リセット
    // =============================================
    function resetInputs() {
      puzzles.forEach(function(p, idx) {
        p.userInput = '';
        var answerEl = document.getElementById('answer-' + idx);
        if (answerEl) {
          answerEl.textContent = '';
          answerEl.classList.remove('correct', 'wrong', 'filled');
        }
      });
      updateProgress();
    }

    // =============================================
    // シャッフル
    // =============================================
    function shuffleArray(arr) {
      var a = arr.slice();
      for (var i = a.length - 1; i > 0; i--) {
        var j = Math.floor(Math.random() * (i + 1));
        var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
      }
      return a;
    }

    // =============================================
    // ナビゲーション
    // =============================================
    function goTop() { window.location.href = '../'; }

    // ダイアログ外タップで閉じる
    document.getElementById('input-dialog').addEventListener('click', function(e) {
      if (e.target === this) closeInputDialog();
    });

    // =============================================
    // 起動
    // =============================================
    fetchData();
  </script>
</body>
</html>
