<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>非公式灘手CC脳トレミニゲーム広場</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', 'Meiryo', sans-serif;
      background-color: #fdf6ee;
      color: #4a3728;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 16px;
    }

    #app {
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      padding-bottom: 32px;
    }

    /* ヘッダー */
    .header {
      text-align: center;
      padding: 32px 24px 24px;
      background-color: #fffaf4;
      border-radius: 20px;
      box-shadow: 0 4px 16px rgba(180, 120, 60, 0.15);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .header-icon {
      font-size: 52px;
    }

    .header-title {
      font-size: 28px;
      font-weight: bold;
      color: #c96a28;
    }

    .header-subtitle {
      font-size: 16px;
      color: #8c6b4a;
    }

    /* ゲームカード */
    .game-card {
      background-color: #fffaf4;
      border-radius: 20px;
      box-shadow: 0 4px 16px rgba(180, 120, 60, 0.15);
      overflow: hidden;
      text-decoration: none;
      color: inherit;
      display: block;
      transition: transform 0.15s, box-shadow 0.15s;
      -webkit-tap-highlight-color: transparent;
    }

    .game-card:active {
      transform: scale(0.98);
      box-shadow: 0 2px 8px rgba(180, 120, 60, 0.15);
    }

    .game-card-inner {
      display: flex;
      align-items: center;
      gap: 20px;
      padding: 24px;
    }

    .game-card-icon {
      font-size: 48px;
      flex-shrink: 0;
      width: 64px;
      text-align: center;
    }

    .game-card-body {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .game-card-label {
      font-size: 12px;
      font-weight: bold;
      color: #e07b39;
      letter-spacing: 0.05em;
    }

    .game-card-title {
      font-size: 22px;
      font-weight: bold;
      color: #4a3728;
    }

    .game-card-desc {
      font-size: 15px;
      color: #8c6b4a;
      line-height: 1.5;
    }

    .game-card-arrow {
      font-size: 22px;
      color: #e07b39;
      flex-shrink: 0;
    }

    /* 今月のおすすめバッジ */
    .badge-new {
      display: inline-block;
      background-color: #e07b39;
      color: #fff;
      font-size: 12px;
      font-weight: bold;
      padding: 2px 10px;
      border-radius: 99px;
      margin-bottom: 4px;
    }

    /* 準備中カード */
    .game-card.coming-soon {
      opacity: 0.55;
      pointer-events: none;
    }

    .game-card.coming-soon .game-card-label {
      color: #8c6b4a;
    }

    .game-card.coming-soon .game-card-arrow {
      color: #c4a882;
    }
  </style>
</head>
<body>
  <div id="app">

    <div class="header">
      <div class="header-icon">🏘️</div>
      <h1 class="header-title">非公式灘手CC<br>脳トレミニゲーム広場</h1>
      <p class="header-subtitle">地域のみんなで楽しもう！</p>
    </div>

    <!-- 4択クイズ -->
    <a href="quiz/" class="game-card">
      <div class="game-card-inner">
        <div class="game-card-icon">🧠</div>
        <div class="game-card-body">
          <span class="badge-new">今月のおすすめ</span>
          <span class="game-card-label">ミニゲーム</span>
          <p class="game-card-title">4択クイズ</p>
          <p class="game-card-desc">地域のことをどれだけ知っているかな？</p>
        </div>
        <div class="game-card-arrow">›</div>
      </div>
    </a>

    <!-- クロスワード -->
    <a href="crossword/" class="game-card">
      <div class="game-card-inner">
        <div class="game-card-icon">📝</div>
        <div class="game-card-body">
          <span class="game-card-label">ミニゲーム</span>
          <p class="game-card-title">クロスワードパズル</p>
          <p class="game-card-desc">ヒントを読んでマスを埋めよう！</p>
        </div>
        <div class="game-card-arrow">›</div>
      </div>
    </a>

    <!-- 絵合わせ -->
    <a href="memory-game/" class="game-card">
      <div class="game-card-inner">
        <div class="game-card-icon">🃏</div>
        <div class="game-card-body">
          <span class="game-card-label">ミニゲーム</span>
          <p class="game-card-title">絵合わせ（神経衰弱）</p>
          <p class="game-card-desc">同じ絵のカードを2枚見つけよう！</p>
        </div>
        <div class="game-card-arrow">›</div>
      </div>
    </a>

    <!-- 違い探し（準備中） -->
    <div class="game-card coming-soon">
      <div class="game-card-inner">
        <div class="game-card-icon">🔍</div>
        <div class="game-card-body">
          <span class="game-card-label">準備中</span>
          <p class="game-card-title">違い探し</p>
          <p class="game-card-desc">近日公開予定です。お楽しみに！</p>
        </div>
        <div class="game-card-arrow">›</div>
      </div>
    </div>

  </div>
</body>
</html>
